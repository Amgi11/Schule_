<!DOCTYPE html>
<html lang="de">
  <head>
    <title>Aufgabe_45</title>
    <meta charset="utf-8">
  </head>
  <body>
    <ul id="liste-linz">
      <li></li>
      
    </ul>



    <script>
      // Teil A: Lokale Daten
      const stadtteile = ["Urfahr", "Innere Stadt", "Bindermichel"];
      const liste = document.getElementById("liste-linz");
      stadtteile.forEach(s => {
        let li = document.createElement("li");
        li.textContent = s;
        liste.appendChild(li);
      });
    </script>
  </body>
</html>
